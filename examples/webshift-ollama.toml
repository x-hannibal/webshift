# webshift-ollama.toml — configuration with local Ollama LLM
#
# All LLM features enabled, using Ollama at localhost.
# No API key needed — fully private, all data stays on your machine.

[server]
max_query_budget = 32000
max_total_results = 10
adaptive_budget = true

[backends]
default = "searxng"

[backends.searxng]
url = "http://localhost:8080"

[llm]
enabled = true
base_url = "http://localhost:11434/v1"
model = "gemma3:27b"
timeout = 60
expansion_enabled = true
summarization_enabled = true
llm_rerank_enabled = true

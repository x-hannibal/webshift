# webshift.toml — full configuration example
#
# Place in the working directory, home directory, or pass via --config.
# All values shown are defaults — uncomment and change as needed.

# ── Server settings ──────────────────────────────────────────────────

[server]
# max_download_mb = 1              # Streaming cap per page (MB)
# max_result_length = 8000         # Max chars per cleaned page
# max_query_budget = 32000         # Total char budget across all sources
# max_total_results = 20           # Hard cap on results per call
# search_timeout = 8               # Timeout in seconds
# results_per_query = 5            # Results requested per query
# max_search_queries = 5           # Max queries (after expansion)
# oversampling_factor = 2          # Oversample for gap filling
# auto_recovery_fetch = false      # Re-fetch from reserve pool on failures
# adaptive_budget = false          # BM25-proportional budget allocation
# adaptive_budget_fetch_factor = 3 # Fetch multiplier for adaptive budget
# blocked_domains = []             # Domains to never fetch
# allowed_domains = []             # If set, only fetch these domains
# debug = false
# trace = false
# log_file = ""                    # Log to file instead of stderr

# ── Search backends ──────────────────────────────────────────────────

[backends]
default = "searxng"                # searxng | brave | tavily | exa | serpapi

[backends.searxng]
url = "http://localhost:8080"      # Self-hosted, no API key needed

[backends.brave]
api_key = ""                       # Get free key at brave.com/search/api
# safesearch = 1                   # 0=off, 1=moderate, 2=strict

[backends.tavily]
api_key = ""                       # tavily.com
# search_depth = "basic"           # "basic" or "advanced"

[backends.exa]
api_key = ""                       # exa.ai
# type = "auto"                    # "neural", "keyword", "auto"
# num_sentences = 3                # Sentences per highlight

[backends.serpapi]
api_key = ""                       # serpapi.com
# engine = "google"                # google | bing | duckduckgo | yandex | yahoo
# gl = "us"                        # Geographic location
# hl = "en"                        # Language
# safe = "off"                     # off | moderate | active

# ── LLM features (optional, disabled by default) ────────────────────

[llm]
# enabled = false                  # Master switch for all LLM features
# base_url = "http://localhost:11434/v1"  # Any OpenAI-compatible endpoint
# api_key = ""                     # Not needed for Ollama
# model = "llama3.2"               # Model name
# timeout = 30                     # LLM request timeout (seconds)
# expansion_enabled = true         # Query expansion (when LLM enabled)
# summarization_enabled = true     # Markdown summary with citations
# llm_rerank_enabled = false       # LLM-assisted tier-2 reranking
# max_summary_words = 0            # 0 = auto-compute from budget
# input_budget_factor = 3          # Budget multiplier when LLM summarizes

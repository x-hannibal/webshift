name: Publish

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish webshift
        run: cargo publish -p webshift || echo "already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 15

      - name: Publish webshift-mcp
        run: cargo publish -p webshift-mcp || echo "already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-mcp:
    name: Publish to MCP Registry
    needs: publish-crates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/mcp-publisher_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin mcp-publisher

      - name: Publish to MCP Registry
        run: |
          mcp-publisher login github
          mcp-publisher publish
        env:
          MCP_GITHUB_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
